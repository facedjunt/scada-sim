<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCADA - Мониторинг датчиков</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f0f0f0;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .sensors-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .sensor-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            width: 250px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }
        .sensor-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .sensor-kks {
            font-size: 12px;
            color: gray;
            margin-bottom: 10px;
        }
        .sensor-value {
            font-size: 28px;
            font-weight: bold;
            margin: 10px 0;
        }
        .sensor-unit {
            font-size: 14px;
            color: gray;
        }
        .status-indicator {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin: 10px auto;
        }
        .status-normal { background-color: green; }
        .status-warning { background-color: orange; }
        .status-critical { background-color: red; animation: blink 1s infinite; }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        .update-time {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>
<body>
    <h1>SCADA Мониторинг</h1>
    <div id="sensors" class="sensors-container">
        <p>Загрузка данных...</p>
    </div>
    <div id="updateTime" class="update-time"></div>

    <script>
        async function fetchSensors() {
            try {
                const response = await fetch('http://127.0.0.1:5000/api/sensors');
                const sensors = await response.json();
                displaySensors(sensors);
                
                const now = new Date();
                document.getElementById('updateTime').innerHTML = 
                    `Последнее обновление: ${now.toLocaleTimeString()}`;
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                document.getElementById('sensors').innerHTML = 
                    '<p style="color:red;">Ошибка подключения к серверу</p>';
            }
        }

        function getStatus(value, min_val, max_val) {
            if (value > max_val * 0.7) return 'critical';
            if (value < min_val + (max_val - min_val) * 0.3) return 'warning';
            return 'normal';
        }

        function displaySensors(sensors) {
            const container = document.getElementById('sensors');
            container.innerHTML = sensors.map(sensor => {
                const status = getStatus(sensor.current_val, sensor.min_val, sensor.max_val);
                const statusClass = `status-${status}`;
                
                let colorClass = '';
                if (status === 'critical') colorClass = 'critical-value';
                if (status === 'warning') colorClass = 'warning-value';
                
                return `
                    <div class="sensor-card">
                        <div class="sensor-name">${sensor.name}</div>
                        <div class="sensor-kks">${sensor.kks}</div>
                        <div class="sensor-value" style="color: ${status === 'critical' ? 'red' : status === 'warning' ? 'orange' : 'green'}">
                            ${sensor.current_val}
                            <span class="sensor-unit">${sensor.unit}</span>
                        </div>
                        <div class="status-indicator ${statusClass}"></div>
                        <div style="font-size:12px; margin-top:5px;">
                            Норма: ${sensor.min_val} – ${sensor.max_val} ${sensor.unit}
                        </div>
                    </div>
                `;
            }).join('');
        }

        //первая загрузка
        fetchSensors();
        
        //обновление каждые 2 секунды
        setInterval(fetchSensors, 2000);
    </script>
</body>
</html>
